<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ndzuani News</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#111;
    color:white;
}

/* HEADER */

header{
    background:linear-gradient(to right,darkred,red);
    padding:20px;
    text-align:center;
    box-shadow:0 0 15px red;
}

header h1{
    font-size:42px;
}

header p{
    margin-top:10px;
    color:#eee;
}

/* BARRE ACTUALITÉ */

.top-bar{
    background:#990000;
    overflow:hidden;
    white-space:nowrap;
    border-top:2px solid red;
    border-bottom:2px solid red;
    padding:10px 0;
}

.ticker-container{
    width:100%;
    overflow:hidden;
}

.ticker{
    display:inline-block;
    padding-left:100%;
    animation:tickerMove 25s linear infinite;
    font-weight:bold;
    color:white;
    font-size:18px;
}

@keyframes tickerMove{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-100%);
    }

}

/* RECHERCHE */

.search-box{
    width:90%;
    max-width:1000px;
    margin:20px auto;
}

.search-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    font-size:16px;
    border:2px solid red;
}

/* CONTENU */

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* ARTICLES */

.news-card{
    background:#1b1b1b;
    padding:20px;
    border-left:5px solid red;
    border-radius:12px;
    margin-bottom:20px;
    animation:fade 0.3s;
}

.news-card img,
.news-card video{
    width:100%;
    margin-top:15px;
    border-radius:10px;
}

.news-card h2{
    color:#ff4d4d;
    margin:10px 0;
}

.news-card p{
    color:#ddd;
    line-height:1.5;
}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.actions button{
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.like{
    background:red;
}

.dislike{
    background:#444;
}

.delete{
    background:darkred;
}

.edit{
    background:#ff6600;
}

/* ADMIN */

.admin-btn{
    position:fixed;
    bottom:5px;
    right:5px;
    opacity:0.05;
    width:30px;
    height:30px;
    border:none;
    border-radius:50%;
    background:red;
    color:white;
    cursor:pointer;
}

.admin-panel{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1b1b1b;
    width:90%;
    max-width:500px;
    padding:25px;
    border-radius:15px;
    border:2px solid red;
    z-index:1000;
    max-height:90vh;
    overflow:auto;
}

.admin-panel h2{
    text-align:center;
    color:red;
    margin-bottom:10px;
}

.admin-panel p{
    text-align:center;
    color:#ff4d4d;
    margin-bottom:15px;
}

.admin-panel input,
.admin-panel textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
}

.admin-panel textarea{
    height:120px;
    resize:none;
}

.publish-btn{
    width:100%;
    padding:12px;
    background:red;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-bottom:10px;
}

.close-btn{
    background:#444;
}

/* ANIMATION */

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>

<body>

<header>

    <h1>Ndzuani News</h1>

    <p>L'actualité des Comores en direct</p>

</header>

<!-- BARRE D'ACTUALITÉ -->

<div class="top-bar">

    <div class="ticker-container">

        <div class="ticker"
        id="ticker">

            Bienvenue sur Ndzuani News

        </div>

    </div>

</div>

<!-- RECHERCHE -->

<div class="search-box">

    <input type="text"
        id="searchInput"
        placeholder="Rechercher une actualité..."
        onkeyup="searchNews()">

</div>

<!-- NEWS -->

<div class="container"
id="newsContainer"></div>

<!-- BOUTON ADMIN -->

<button class="admin-btn"
onclick="openAdmin()">●</button>

<!-- PANEL ADMIN -->

<div class="admin-panel"
id="adminPanel">

    <h2>Administration</h2>

    <button class="publish-btn close-btn"
        onclick="openAdmin()">

        Fermer

    </button>

    <p id="userCounter">
        0 utilisateur connecté
    </p>

    <input type="password"
        id="password"
        placeholder="Mot de passe admin">

    <div id="editor"
    style="display:none;">

        <input type="text"
            id="title"
            placeholder="Titre">

        <textarea id="summary"
            placeholder="Résumé"></textarea>

        <input type="file"
            id="media"
            accept="image/*,video/*">

        <button class="publish-btn"
            onclick="publishNews()">

            Publier

        </button>

    </div>

    <button class="publish-btn"
        id="loginBtn"
        onclick="loginAdmin()">

        Connexion

    </button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let adminLogged = false;

let currentNews = [];

let firstLoad = true;

/* ADMIN */

function openAdmin(){

    const panel =
        document.getElementById("adminPanel");

    if(panel.style.display === "block"){

        panel.style.display = "none";

    }
    else{

        panel.style.display = "block";

    }

}

function loginAdmin(){

    const pass =
        document.getElementById("password").value;

    socket.emit("adminLogin", pass);

}

socket.on("adminSuccess", () => {

    adminLogged = true;

    document.getElementById("editor")
        .style.display = "block";

    document.getElementById("password")
        .style.display = "none";

    document.getElementById("loginBtn")
        .style.display = "none";

    renderNews(currentNews);

});

socket.on("adminError", () => {

    alert("Mot de passe incorrect");

});

/* PUBLIER */

function publishNews(){

    const title =
        document.getElementById("title").value;

    const summary =
        document.getElementById("summary").value;

    const mediaInput =
        document.getElementById("media");

    if(title === "" || summary === ""){

        alert("Remplis tous les champs");

        return;

    }

    const file = mediaInput.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            socket.emit("publishNews", {

                title,

                summary,

                media:e.target.result,

                mediaType:file.type

            });

        };

        reader.readAsDataURL(file);

    }
    else{

        socket.emit("publishNews", {

            title,

            summary

        });

    }

}

/* CHARGEMENT */

socket.on("loadNews", (news) => {

    renderNews(news);

    updateTicker(news);

});

/* MISE À JOUR */

socket.on("updateNews", (news) => {

    if(
        !firstLoad &&
        !adminLogged &&
        Notification.permission === "granted"
    ){

        const latest = news[0];

        new Notification("Ndzuani News", {

            body: latest.title,

            icon:
            "https://cdn-icons-png.flaticon.com/512/5968/5968830.png"

        });

    }

    renderNews(news);

    updateTicker(news);

    firstLoad = false;

});

/* UTILISATEURS */

socket.on("userCount", (count) => {

    document.getElementById("userCounter")
        .innerText =
        count + " utilisateur(s) connecté(s)";

});

/* BARRE ACTU */

function updateTicker(news){

    const ticker =
        document.getElementById("ticker");

    if(news.length === 0){

        ticker.innerText =
        "Bienvenue sur Ndzuani News";

        return;

    }

    let text = "";

    news.forEach(post => {

        text +=
        " 🔴 " + post.title + "   ";

    });

    ticker.innerText = text;

}

/* RECHERCHE */

function searchNews(){

    const value =
        document.getElementById("searchInput")
        .value.toLowerCase();

    const filtered =
        currentNews.filter(post =>

            post.title.toLowerCase()
            .includes(value)

            ||

            post.summary.toLowerCase()
            .includes(value)

        );

    renderNews(filtered);

}

/* AFFICHAGE */

function renderNews(news){

    currentNews = news;

    const container =
        document.getElementById("newsContainer");

    container.innerHTML = "";

    news.forEach(post => {

        const card =
            document.createElement("div");

        card.className = "news-card";

        let mediaHTML = "";

        if(post.media){

            if(post.mediaType.startsWith("image")){

                mediaHTML = `
                    <img src="${post.media}">
                `;

            }

            else if(post.mediaType.startsWith("video")){

                mediaHTML = `
                    <video controls>
                        <source src="${post.media}">
                    </video>
                `;

            }

        }

        card.innerHTML = `

            <small style="color:#999;">

                Publié le ${post.date}

            </small>

            <h2>${post.title}</h2>

            <p>${post.summary}</p>

            ${mediaHTML}

            <div class="actions">

                <button class="like"
                    onclick="likeNews(${post.id})">

                    👍 ${post.likes}

                </button>

                <button class="dislike"
                    onclick="dislikeNews(${post.id})">

                    👎 ${post.dislikes}

                </button>

                ${adminLogged ? `

                <button class="delete"
                    onclick="deleteNews(${post.id})">

                    🗑 Supprimer

                </button>

                <button class="edit"
                    onclick="editNews(${post.id})">

                    ✏️ Modifier

                </button>

                ` : ""}

            </div>

        `;

        container.appendChild(card);

    });

}

/* ACTIONS */

function likeNews(id){

    socket.emit("like", id);

}

function dislikeNews(id){

    socket.emit("dislike", id);

}

function deleteNews(id){

    socket.emit("deleteNews", id);

}

function editNews(id){

    const post = currentNews.find(
        p => p.id == id
    );

    if(!post) return;

    const newTitle =
        prompt("Modifier le titre", post.title);

    if(newTitle === null) return;

    const newSummary =
        prompt("Modifier le résumé", post.summary);

    if(newSummary === null) return;

    socket.emit("editNews", {

        id:id,

        title:newTitle,

        summary:newSummary

    });

}

/* NOTIFICATIONS */

if(Notification.permission !== "granted"){

    Notification.requestPermission();

}

</script>

</body>

</html>
